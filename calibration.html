<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TUVAQ — Panorama Calibration Tool</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:#0b2230; color:#e7f1f0; font-family:sans-serif; padding:20px; }
  h1{ font-size:18px; margin-bottom:16px; color:#52e3a4; letter-spacing:0.05em; }

  .controls{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:14px;
    margin-bottom:20px;
    background:rgba(0,0,0,0.3);
    padding:16px;
    border-radius:10px;
  }
  .control-row{ display:flex; flex-direction:column; gap:6px; }
  label{ font-size:12px; color:#a8c0c4; letter-spacing:0.04em; }
  .slider-row{ display:flex; align-items:center; gap:10px; }
  input[type=range]{ flex:1; accent-color:#52e3a4; }
  .val{ font-size:13px; font-weight:700; color:#e7f1f0; min-width:60px; text-align:right; }

  .output-code{
    background:#06141f;
    border:1px solid rgba(82,227,164,0.3);
    border-radius:8px;
    padding:14px;
    font-family:monospace;
    font-size:13px;
    color:#52e3a4;
    margin-bottom:20px;
    word-break:break-all;
  }
  .output-code span{ color:#fbbf24; }

  canvas{
    display:block;
    width:100%;
    border-radius:10px;
    background:#142a38;
    border:1px solid rgba(231,241,240,0.08);
  }
  .status{
    font-size:12px;
    color:#a8c0c4;
    margin-bottom:10px;
  }
  button{
    background:#52e3a4;
    color:#06141f;
    border:none;
    padding:8px 18px;
    border-radius:6px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    margin-right:8px;
    margin-bottom:14px;
  }
  button:hover{ background:#6ef5b8; }
  .btn-secondary{
    background:transparent;
    border:1px solid rgba(82,227,164,0.4);
    color:#52e3a4;
  }
</style>
</head>
<body>

<h1>TUVAQ — Panorama Calibration Tool</h1>

<div class="controls">
  <div class="control-row">
    <label>OVERLAP (px) — horizontal offset between images</label>
    <div class="slider-row">
      <input type="range" id="overlap" min="0" max="800" step="1" value="266">
      <span class="val" id="overlap-val">266</span>
    </div>
  </div>
  <div class="control-row">
    <label>ROTATION (°) — tilt of East image</label>
    <div class="slider-row">
      <input type="range" id="rotation" min="-15" max="15" step="0.1" value="-3.8">
      <span class="val" id="rotation-val">-3.8°</span>
    </div>
  </div>
  <div class="control-row">
    <label>VERTICAL OFFSET (px) — vertical shift of East image</label>
    <div class="slider-row">
      <input type="range" id="voffset" min="-600" max="600" step="1" value="365">
      <span class="val" id="voffset-val">365</span>
    </div>
  </div>
  <div class="control-row">
    <label>SCALE — resize East image relative to West</label>
    <div class="slider-row">
      <input type="range" id="scale" min="0.5" max="1.5" step="0.01" value="1.0">
      <span class="val" id="scale-val">1.00</span>
    </div>
  </div>
</div>

<div class="output-code" id="output-code">
  Adjust sliders to calibrate, then copy these values into the site.
</div>

<button onclick="reload()">↺ Reload images</button>
<button class="btn-secondary" onclick="copyValues()">Copy values</button>

<div class="status" id="status">Loading images…</div>
<canvas id="canvas"></canvas>

<script>
  const WEST_URL = 'https://www.zeitdice.com/api/v4/sources/1BBCB9F4AB97C3521/stills/latest?key=b529d0ef806a38097b66';
  const EAST_URL = 'https://www.zeitdice.com/api/v4/sources/1BBCB9F4AB97C3520/stills/latest?key=5b982652bb8a18b71ae4';

  let imgW = null, imgE = null;

  function loadImg(url){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url + '&_=' + Date.now(); // cache bust
    });
  }

  function getParams(){
    return {
      overlap:  parseInt(document.getElementById('overlap').value),
      rotation: parseFloat(document.getElementById('rotation').value),
      voffset:  parseInt(document.getElementById('voffset').value),
      scale:    parseFloat(document.getElementById('scale').value)
    };
  }

  function stitch(){
    if (!imgW || !imgE) return;
    const { overlap, rotation, voffset, scale } = getParams();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const h = Math.min(imgW.naturalHeight, imgE.naturalHeight);
    const wW = Math.round(imgW.naturalWidth * h / imgW.naturalHeight);
    const wE = Math.round(imgE.naturalWidth * h / imgE.naturalHeight * scale);
    const hE = Math.round(h * scale);

    const rotRad = rotation * Math.PI / 180;
    const cosA = Math.abs(Math.cos(rotRad));
    const sinA = Math.abs(Math.sin(rotRad));
    const rW = Math.ceil(wE * cosA + hE * sinA);
    const rH = Math.ceil(wE * sinA + hE * cosA);

    const totalW = wW + rW - overlap;
    const extraH = Math.abs(voffset);
    const totalH = Math.max(h, rH) + extraH;

    canvas.width  = totalW;
    canvas.height = totalH;
    ctx.fillStyle = '#0b2230';
    ctx.fillRect(0, 0, totalW, totalH);

    // west image centered vertically
    const westY = (totalH - h) / 2;
    ctx.drawImage(imgW, 0, westY, wW, h);

    // east image: rotated, placed with offset
    ctx.save();
    const eastX = wW - overlap + rW / 2;
    const eastY = westY - voffset + rH / 2;
    ctx.translate(eastX, eastY);
    ctx.rotate(rotRad);
    ctx.drawImage(imgE, -wE/2, -hE/2, wE, hE);
    ctx.restore();

    // update code output
    document.getElementById('output-code').innerHTML =
      `merged: {\n  overlapPx: <span>${overlap}</span>,\n  rotationDeg: <span>${rotation}</span>,\n  verticalOffset: <span>${voffset}</span>,\n  scaleEast: <span>${scale}</span>\n}`;

    document.getElementById('status').textContent =
      `West: ${imgW.naturalWidth}×${imgW.naturalHeight}px | East: ${imgE.naturalWidth}×${imgE.naturalHeight}px | Canvas: ${totalW}×${totalH}px`;
  }

  function reload(){
    document.getElementById('status').textContent = 'Reloading images…';
    imgW = null; imgE = null;
    Promise.all([loadImg(WEST_URL), loadImg(EAST_URL)]).then(([w, e]) => {
      imgW = w; imgE = e;
      stitch();
    }).catch(err => {
      document.getElementById('status').textContent = 'Error loading images: ' + err;
    });
  }

  function copyValues(){
    const { overlap, rotation, voffset, scale } = getParams();
    const txt = `overlapPx: ${overlap}, rotationDeg: ${rotation}, verticalOffset: ${voffset}, scaleEast: ${scale}`;
    navigator.clipboard.writeText(txt).then(() => alert('Copied to clipboard!'));
  }

  // wire up sliders
  ['overlap','rotation','voffset','scale'].forEach(id => {
    const el = document.getElementById(id);
    const valEl = document.getElementById(id + '-val');
    el.addEventListener('input', () => {
      let v = el.value;
      if (id === 'rotation') v = parseFloat(v).toFixed(1) + '°';
      if (id === 'scale')    v = parseFloat(v).toFixed(2);
      valEl.textContent = v;
      stitch();
    });
  });

  reload();
</script>
</body>
</html>
