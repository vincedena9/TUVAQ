<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TUVAQ — Sea Ice Cameras, Mittimatalik</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root{
    --ink:#06141f;
    --deep:#0b2230;
    --slate:#173548;
    --ice:#e7f1f0;
    --ice-dim:#a8c0c4;
    --aurora:#52e3a4;
    --signal:#ff8c4d;
    --font-display:'Sora', sans-serif;
    --font-body:'Inter', sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }

  html,body{
    height:100%;
    font-family:var(--font-body);
    background:var(--ink);
    color:var(--ice);
    overflow:hidden;
  }

  /* ---------- MAP ---------- */
  #map{
    position:absolute;
    inset:0;
    z-index:0;
    background:var(--ink);
  }

  #map{
    filter: saturate(0.85) brightness(0.85) contrast(1.05);
  }

  .leaflet-control-attribution{
    background:rgba(6,20,31,0.7) !important;
    color:var(--ice-dim) !important;
    font-family:var(--font-body);
    font-size:10px;
  }
  .leaflet-control-attribution a{ color:var(--ice-dim) !important; }

  .leaflet-control-zoom{
    border:none !important;
    box-shadow:0 2px 12px rgba(0,0,0,0.4) !important;
  }
  .leaflet-control-zoom a{
    background:rgba(11,34,48,0.85) !important;
    color:var(--ice) !important;
    border:1px solid rgba(231,241,240,0.12) !important;
    backdrop-filter: blur(6px);
  }
  .leaflet-control-zoom a:hover{
    background:var(--slate) !important;
    color:var(--aurora) !important;
  }
  .leaflet-bar{ border-radius:8px !important; overflow:hidden; }

  /* ---------- HEADER ---------- */
  header{
    position:absolute;
    top:0; left:0; right:0;
    z-index:1000;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 22px;
    background:linear-gradient(to bottom, rgba(6,20,31,0.9) 0%, rgba(6,20,31,0) 100%);
    pointer-events:none;
  }

  .wordmark{
    font-family:var(--font-display);
    font-weight:700;
    font-size:22px;
    letter-spacing:0.12em;
    color:var(--ice);
    display:flex;
    align-items:baseline;
    gap:8px;
    pointer-events:auto;
  }
  .wordmark .dot{
    width:8px; height:8px;
    border-radius:50%;
    background:var(--aurora);
    box-shadow:0 0 8px var(--aurora);
    display:inline-block;
    transform:translateY(-2px);
  }
  .wordmark small{
    font-family:var(--font-body);
    font-weight:400;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--ice-dim);
    text-transform:uppercase;
  }

  .header-sub{
    font-size:12px;
    color:var(--ice-dim);
    text-align:right;
    line-height:1.5;
    pointer-events:auto;
    font-weight:600;
    letter-spacing:0.08em;
  }

  /* ---------- SITE MARKER ---------- */
  .cam-marker{
    --marker-color: var(--signal);
    width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .cam-marker .ring{
    position:absolute;
    width:44px; height:44px;
    border-radius:50%;
    border:2px solid var(--marker-color);
    opacity:0.65;
    animation:ping 2.4s ease-out infinite;
  }
  .cam-marker .core{
    width:19px; height:19px;
    border-radius:50%;
    background:var(--marker-color);
    box-shadow:0 0 12px var(--marker-color), 0 0 2px rgba(0,0,0,0.4) inset;
    border:2.5px solid rgba(6,20,31,0.9);
    transition:transform 0.15s ease;
    z-index:1;
  }
  .cam-marker.clickable{ cursor:pointer; }
  .cam-marker.clickable:hover .core{ transform:scale(1.18); }
  .cam-marker.quiet .ring{ display:none; }

  @keyframes ping{
    0%   { transform:scale(0.5); opacity:0.7; }
    70%  { transform:scale(1.6); opacity:0; }
    100% { transform:scale(1.6); opacity:0; }
  }

  .cam-label{
    white-space:nowrap;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.03em;
    color:var(--ice);
    background:rgba(6,20,31,0.78);
    padding:5px 12px;
    border-radius:6px;
    border:1px solid rgba(231,241,240,0.1);
    pointer-events:none;
    backdrop-filter:blur(4px);
  }

  /* ---------- FOV SECTOR ---------- */
  /* Colors are applied per-camera via Leaflet's polygon style
     options (see buildMap() in the script below), not CSS. */
  .leaflet-interactive{ cursor:pointer; }

  /* ---------- IMAGE PANEL ---------- */
  .panel-backdrop{
    position:fixed;
    inset:0;
    background:rgba(6,20,31,0.55);
    backdrop-filter:blur(2px);
    z-index:1900;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
  }
  .panel-backdrop.open{
    opacity:1;
    pointer-events:auto;
  }

  .panel{
    position:fixed;
    z-index:2000;
    background:var(--deep);
    border:1px solid rgba(231,241,240,0.08);
    box-shadow:0 -8px 40px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    transform:translateY(100%);
    transition:transform 0.32s cubic-bezier(0.22,0.9,0.3,1);

    left:0; right:0; bottom:0;
    border-radius:18px 18px 0 0;
    max-height:78vh;
  }
  .panel.open{ transform:translateY(0); }

  .panel-handle{
    width:36px; height:4px;
    background:rgba(231,241,240,0.18);
    border-radius:3px;
    margin:10px auto 0;
    flex-shrink:0;
  }

  .panel-header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    padding:14px 18px 10px;
    flex-shrink:0;
  }

  .panel-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:17px;
    letter-spacing:0.02em;
    color:var(--ice);
  }
  .panel-meta{
    font-size:12px;
    color:var(--ice-dim);
    margin-top:4px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .panel-meta .dot{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--aurora);
    box-shadow:0 0 6px var(--aurora);
    display:inline-block;
  }

  .panel-close{
    width:32px; height:32px;
    border-radius:50%;
    background:rgba(231,241,240,0.06);
    border:1px solid rgba(231,241,240,0.1);
    color:var(--ice);
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:background 0.15s ease;
  }
  .panel-close:hover{ background:rgba(231,241,240,0.14); }

  .panel-image-wrap{
    flex:1;
    overflow:hidden;
    padding:0 18px 18px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .panel-image-wrap img{
    width:100%;
    height:auto;
    max-height:55vh;
    object-fit:cover;
    border-radius:10px;
    border:1px solid rgba(231,241,240,0.08);
    background:var(--slate);
    display:block;
  }

  .panel-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px 18px;
    font-size:11px;
    color:var(--ice-dim);
    letter-spacing:0.03em;
    flex-shrink:0;
  }
  .panel-footer a{
    color:var(--aurora);
    text-decoration:none;
    font-weight:600;
  }
  .panel-footer a:hover{ text-decoration:underline; }

  /* ---------- CAMERA CHOOSER (fallback for multi-cam sites w/o FOV) ---------- */
  .chooser-hint{
    font-size:12px;
    color:var(--ice-dim);
    margin-bottom:10px;
    line-height:1.5;
  }
  .chooser-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .chooser-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 14px;
    background:rgba(231,241,240,0.04);
    border:1px solid rgba(231,241,240,0.1);
    border-radius:10px;
    cursor:pointer;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .chooser-item:hover{
    background:rgba(82,227,164,0.08);
    border-color:rgba(82,227,164,0.35);
  }
  .chooser-item .ci-name{
    font-weight:600;
    font-size:14px;
    color:var(--ice);
  }
  .chooser-item .ci-time{
    font-size:11px;
    color:var(--ice-dim);
    margin-top:2px;
  }
  .chooser-item .ci-arrow{
    color:var(--aurora);
    font-size:16px;
    flex-shrink:0;
  }

  /* ---------- LEGEND / INTRO CARD ---------- */
  .intro-card{
    position:absolute;
    bottom:18px; left:18px;
    z-index:1000;
    max-width:380px;
    background:rgba(11,34,48,0.78);
    backdrop-filter:blur(6px);
    border:1px solid rgba(231,241,240,0.08);
    border-radius:10px;
    padding:10px 16px;
    font-size:12px;
    color:var(--ice-dim);
    line-height:1.4;
    pointer-events:none;
    display:flex;
    align-items:baseline;
    flex-wrap:wrap;
    column-gap:8px;
  }
  .intro-card strong{
    color:var(--aurora);
    font-family:var(--font-display);
    font-size:13px;
    letter-spacing:0.03em;
    flex-shrink:0;
  }

  @media (max-width: 767px){
    .intro-card{
      right:18px;
      left:18px;
      max-width:none;
    }
  }

  /* ---------- DESKTOP LAYOUT ---------- */
  @media (min-width: 768px){
    .panel{
      left:auto;
      bottom:0;
      top:0;
      right:0;
      width:420px;
      max-height:none;
      border-radius:0;
      border-left:1px solid rgba(231,241,240,0.08);
      transform:translateX(100%);
      box-shadow:-8px 0 40px rgba(0,0,0,0.5);
    }
    .panel.open{ transform:translateX(0); }
    .panel-handle{ display:none; }
    .panel-image-wrap img{ max-height:none; }

    .intro-card{
      bottom:24px; left:24px;
    }

    header{ padding:24px 28px; }
  }
</style>
</head>
<body>

<div id="map"></div>

<header>
  <div class="wordmark">
    <span class="dot"></span>
    TUVAQ
    <small>Community sea ice monitoring</small>
  </div>
  <div class="header-sub">
    <div id="live-count">MITTIMATALIK ( TASIUJAQ )</div>
  </div>
</header>

<div class="intro-card">
  <strong id="cam-count-label">— cameras active</strong>
  Tap a marker or shaded sector on the map to see the latest image from that camera.
</div>

<!-- IMAGE PANEL -->
<div class="panel-backdrop" id="backdrop"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div>
      <div class="panel-title" id="panel-title">Igarjuaq</div>
      <div class="panel-meta" id="panel-meta"><span class="dot"></span><span id="panel-time">Latest image — 12 min ago</span></div>
    </div>
    <div class="panel-close" id="panel-close">✕</div>
  </div>

  <!-- Chooser view: shown when a site has multiple cameras and no FOV defined -->
  <div class="panel-chooser" id="panel-chooser" style="display:none; padding:0 18px 18px;">
    <div class="chooser-hint">This site has multiple cameras. Choose a view:</div>
    <div class="chooser-list" id="chooser-list"></div>
  </div>

  <!-- Image view -->
  <div class="panel-image-wrap" id="panel-image-wrap">
    <img id="panel-image" src="https://images.unsplash.com/photo-1517783999520-f068d7431a60?q=80&w=1200&auto=format&fit=crop" alt="Latest image from the Igarjuaq camera">
  </div>
  <div class="panel-footer" id="panel-footer">
    <span id="panel-back" style="display:none; cursor:pointer; color:var(--aurora); font-weight:600;">← Change camera</span>
    <span id="panel-source">TUVAQ · Camera network</span>
    <a href="#" id="panel-link">Full gallery →</a>
  </div>
</div>

<script>
  // ============================================================
  // MAP SETUP
  // ------------------------------------------------------------
  // Default view: Pond Inlet (Mittimatalik) & Bylot Island,
  // looking across Tasiujaq / Eclipse Sound.
  //
  // On narrow (mobile) viewports the same zoom level shows a much
  // smaller geographic area than on a wide desktop screen, so we
  // start one zoom level out on phones to keep both camera sites
  // comfortably in view.
  // ============================================================
  const isMobile = window.innerWidth < 768;
  const defaultZoom = isMobile ? 9 : 10;

  const map = L.map('map', {
    zoomControl: true,
    attributionControl: true,
    minZoom: 6,
    maxZoom: 18
  }).setView([72.79, -77.75], defaultZoom);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Imagery &copy; Esri, Maxar, Earthstar Geographics',
    maxZoom: 18
  }).addTo(map);

  map.zoomControl.setPosition('bottomright');

  // ============================================================
  // SITES & CAMERAS
  // ------------------------------------------------------------
  // lat / lng: real coordinates (WGS84). The two placeholders
  // below are approximate — adjust to the cameras' actual
  // positions once known.
  //
  // fov (optional): field-of-view sector, defined as a
  // direction (deg, 0 = north, clockwise), an angular width
  // (deg), and a length in metres. Drawn as a translucent
  // rounded sector on the map, directly clickable to open
  // that camera's image.
  // ============================================================
  const sites = [
    {
      id: 'igarjuaq',
      name: 'Igarjuaq',
      lat: 72.75535,
      lng: -77.5285,
      cameras: [
        {
          id: 'igarjuaq-west',
          name: 'Igarjuaq — West',
          time: 'Latest image — 12 min ago',
          image: 'https://images.unsplash.com/photo-1517783999520-f068d7431a60?q=80&w=1200&auto=format&fit=crop',
          link: 'https://www.timelapse.gallery/g/tuvaq',
          color: '#a78bfa', // purple
          fov: { direction: 315, width: 90, length: 6000 }   // length in metres, covers W (270°) to N (360°)
        },
        {
          id: 'igarjuaq-east',
          name: 'Igarjuaq — East',
          time: 'Latest image — 12 min ago',
          image: 'https://images.unsplash.com/photo-1517783999520-f068d7431a60?q=80&w=1200&auto=format&fit=crop',
          link: 'https://www.timelapse.gallery/g/tuvaq',
          color: '#fbbf24', // yellow
          fov: { direction: 45, width: 90, length: 6000 }    // covers N (0°) to E (90°)
        }
      ]
    },
    {
      id: 'mittimatalik-beach',
      name: 'Mittimatalik Beach',
      lat: 72.697949,
      lng: -77.972857,
      cameras: [
        {
          id: 'mittimatalik-beach-1',
          name: 'Mittimatalik Beach',
          time: 'Latest image — 12 min ago',
          image: 'https://images.unsplash.com/photo-1517783999520-f068d7431a60?q=80&w=1200&auto=format&fit=crop',
          link: 'https://www.timelapse.gallery/g/tuvaq',
          color: '#f87171' // red
        }
      ]
    }
  ];

  // ============================================================
  // CUSTOM MARKER / LABEL ICONS
  // ============================================================
  function camIcon(quiet, color){
    const c = color || 'var(--signal)';
    return L.divIcon({
      className: '',
      html: `<div class="cam-marker ${quiet ? 'quiet' : 'clickable'}" style="--marker-color:${c};">
               <div class="ring"></div>
               <div class="core"></div>
             </div>`,
      iconSize: [44, 44],
      iconAnchor: [22, 22]
    });
  }

  function labelIcon(name){
    return L.divIcon({
      className: '',
      html: `<div class="cam-label">${name}</div>`,
      iconSize: [0, 0],
      iconAnchor: [-14, -10] // nudge label down/right of marker center
    });
  }

  // ============================================================
  // FIELD-OF-VIEW SECTORS
  // ------------------------------------------------------------
  // Builds a rounded sector polygon (a "pie slice" with a
  // curved outer edge) as an array of [lat, lng] points,
  // suitable for L.polygon.
  // ============================================================
  function fovSectorLatLngs(site, fov){
    const cx = site.lat;
    const cy = site.lng;
    const dir = fov.direction;
    const halfWidth = fov.width / 2;
    const radius = fov.length;

    const metresPerDegLat = 111320;
    const metresPerDegLng = 111320 * Math.cos(cx * Math.PI / 180);

    function toLatLng(angleDeg, r){
      const rad = angleDeg * Math.PI / 180;
      const dLat = (r * Math.cos(rad)) / metresPerDegLat;
      const dLng = (r * Math.sin(rad)) / metresPerDegLng;
      return [cx + dLat, cy + dLng];
    }

    const points = [[cx, cy]];
    const steps = 24;
    for (let i = 0; i <= steps; i++){
      const angle = (dir - halfWidth) + (fov.width * i / steps);
      points.push(toLatLng(angle, radius));
    }
    points.push([cx, cy]);
    return points;
  }

  // ============================================================
  // BUILD MARKERS, LABELS, FOV SECTORS
  // ============================================================
  const fovPolygons = []; // { id, polygon, color }

  function buildMap(){
    sites.forEach(site => {
      const camsWithFov = site.cameras.filter(c => c.fov);
      const quiet = camsWithFov.length > 0;

      // marker color: all site markers share the same red dot
      // (per-camera identity is carried by the colored FOV
      // sectors for multi-camera sites like Igarjuaq)
      const markerColor = '#f87171';

      const marker = L.marker([site.lat, site.lng], { icon: camIcon(quiet, markerColor) }).addTo(map);

      // label
      L.marker([site.lat, site.lng], {
        icon: labelIcon(site.name),
        interactive: false
      }).addTo(map);

      if (camsWithFov.length > 0){
        // each camera with a FOV gets a clickable rounded sector,
        // colored individually
        camsWithFov.forEach(cam => {
          const latlngs = fovSectorLatLngs(site, cam.fov);
          const color = cam.color || '#ff8c4d';
          const poly = L.polygon(latlngs, {
            color: color,
            weight: 2,
            opacity: 0.7,
            fillColor: color,
            fillOpacity: 0.20
          }).addTo(map);

          poly.on('click', () => openPanel(site, cam));
          poly.on('mouseover', () => highlightFov(cam.id));
          poly.on('mouseout', () => highlightFov(null));

          fovPolygons.push({ id: cam.id, polygon: poly, color: color });
        });
      } else {
        // no FOV: marker itself is the click target
        marker.on('click', () => openPanel(site));
      }
    });
  }

  function highlightFov(camId){
    fovPolygons.forEach(({id, polygon, color}) => {
      if (camId && id === camId){
        polygon.setStyle({ fillOpacity: 0.38, opacity: 1, weight: 3 });
      } else {
        polygon.setStyle({ fillOpacity: 0.20, opacity: 0.7, weight: 2 });
      }
    });
  }

  // ============================================================
  // IMAGE PANEL
  // ============================================================
  const panel = document.getElementById('panel');
  const backdrop = document.getElementById('backdrop');
  const panelTitle = document.getElementById('panel-title');
  const panelMeta = document.getElementById('panel-meta');
  const panelTime = document.getElementById('panel-time');
  const panelImage = document.getElementById('panel-image');
  const panelImageWrap = document.getElementById('panel-image-wrap');
  const panelLink = document.getElementById('panel-link');
  const panelChooser = document.getElementById('panel-chooser');
  const chooserList = document.getElementById('chooser-list');
  const panelBack = document.getElementById('panel-back');
  const panelFooter = document.getElementById('panel-footer');

  function openPanel(site, cam){
    panelTitle.textContent = site.name;

    if (cam){
      showCamera(site, cam);
    } else if (site.cameras.length > 1){
      showChooser(site);
    } else {
      showCamera(site, site.cameras[0]);
    }

    panel.classList.add('open');
    backdrop.classList.add('open');
  }

  function showChooser(site){
    panelMeta.style.display = 'none';
    panelImageWrap.style.display = 'none';
    panelFooter.style.display = 'none';
    panelChooser.style.display = 'block';
    highlightFov(null);

    chooserList.innerHTML = '';
    site.cameras.forEach(cam => {
      const item = document.createElement('div');
      item.className = 'chooser-item';
      item.innerHTML = `
        <div>
          <div class="ci-name">${cam.name}</div>
          <div class="ci-time">${cam.time}</div>
        </div>
        <div class="ci-arrow">→</div>
      `;
      item.addEventListener('click', () => showCamera(site, cam));
      item.addEventListener('mouseenter', () => highlightFov(cam.id));
      item.addEventListener('mouseleave', () => highlightFov(null));
      chooserList.appendChild(item);
    });
  }

  function showCamera(site, cam){
    panelMeta.style.display = 'flex';
    panelImageWrap.style.display = 'flex';
    panelFooter.style.display = 'flex';
    panelChooser.style.display = 'none';

    panelTitle.textContent = cam.name;
    panelTime.textContent = cam.time;
    panelImage.src = cam.image;
    panelImage.alt = `Latest image from the ${cam.name} camera`;
    panelLink.href = cam.link;

    highlightFov(cam.id);

    if (site.cameras.length > 1){
      panelBack.style.display = 'inline';
      panelBack.onclick = () => {
        panelTitle.textContent = site.name;
        showChooser(site);
      };
    } else {
      panelBack.style.display = 'none';
    }
  }

  function closePanel(){
    panel.classList.remove('open');
    backdrop.classList.remove('open');
    highlightFov(null);
  }

  document.getElementById('panel-close').addEventListener('click', closePanel);
  backdrop.addEventListener('click', closePanel);

  // ============================================================
  // LIVE CAMERA COUNT
  // ============================================================
  function updateLiveCount(){
    const total = sites.reduce((sum, site) => sum + site.cameras.length, 0);
    const label = total === 1 ? 'camera active' : 'cameras active';
    document.getElementById('cam-count-label').textContent = `${total} ${label}`;
  }

  // ============================================================
  // INIT
  // ============================================================
  buildMap();
  updateLiveCount();
